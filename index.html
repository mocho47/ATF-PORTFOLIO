<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ATF by Simplex — Trabajos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070a0e;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.header{background:#0d1117;border-bottom:1px solid #21262d;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:26px;font-weight:900;color:#00d4ff;letter-spacing:-1px}
.logo span{color:#7d8590;font-weight:400;font-size:12px;margin-left:5px}
.wa-top{background:#25D366;color:#000;font-weight:800;font-size:13px;padding:8px 16px;border-radius:8px;text-decoration:none}
.hero{padding:32px 20px 20px;text-align:center}
.hero h1{font-size:22px;font-weight:900;margin-bottom:6px}
.hero p{font-size:13px;color:#7d8590}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:12px 12px 100px;max-width:960px;margin:0 auto}
.card{background:#0d1117;border:1px solid #21262d;border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{border-color:#00d4ff40;transform:translateY(-2px)}
.thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:#161b22}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#00000055}
.play-circle{width:48px;height:48px;border-radius:50%;background:#00d4ff20;border:2px solid #00d4ff80;display:flex;align-items:center;justify-content:center}
.tri{width:0;height:0;border:solid transparent;border-width:9px 0 9px 16px;border-left-color:#00d4ff;margin-left:3px}
.info{padding:14px}
.titulo{font-size:15px;font-weight:700;margin-bottom:4px}
.anno{font-size:12px;color:#7d8590}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid #21262d;padding:14px 20px;display:flex;gap:10px}
.btn-wa{flex:1;background:#25D366;color:#000;font-weight:800;font-size:15px;padding:14px;border-radius:10px;text-decoration:none;text-align:center}
.btn-fb{flex:1;background:#1877F2;color:#fff;font-weight:700;font-size:15px;padding:14px;border-radius:10px;text-decoration:none;text-align:center}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:#000d;z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal video{width:100%;max-height:80vh;object-fit:contain}
.modal-close{position:absolute;top:16px;right:16px;background:#ffffff20;border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="logo">ATF <span>by Simplex</span></div>
  <a href="https://wa.me/523326148674?text=Vi+sus+trabajos%2C+quiero+informes" class="wa-top">Agendar cita</a>
</div>

<div class="hero">
  <h1>Nuestros trabajos</h1>
  <p>Retrofit · Tuning · Diseño de Iluminación Automotriz · Guadalajara</p>
</div>

<div class="grid" id="grid"></div>

<div class="bottom">
  <a class="btn-wa" href="https://wa.me/523326148674?text=Vi+sus+trabajos%2C+quiero+agendar+cita">Agendar cita</a>
  <a class="btn-fb" href="https://www.facebook.com/ATFbySimplex" target="_blank">Ver en Facebook</a>
</div>

<div class="modal" id="modal" onclick="cerrar(event)">
  <button class="modal-close" onclick="cerrar()">✕</button>
  <video id="mvid" controls playsinline></video>
</div>

<script>
const VIDEOS = [
  {titulo:"Retrofit Completo 2024", anno:"2024", video:"atf_2024_retrofit_completo.mp4"},
  {titulo:"Transformacion 2023",    anno:"2023", video:"atf_2023_transformacion.mp4"},
  {titulo:"Trabajo 2025",           anno:"2025", video:"atf_2025_nuevo.mp4"},
  {titulo:"Clasico 2022",           anno:"2022", video:"atf_2022_clasico.mp4"},
  {titulo:"Resultado 2023",         anno:"2023", video:"atf_2023_resultado.mp4"},
  {titulo:"Trabajo 2023",           anno:"2023", video:"atf_2023_trabajo.mp4"},
];
const grid = document.getElementById('grid');
VIDEOS.forEach(v=>{
  grid.innerHTML+=`
  <div class="card" onclick="ver('videos/${v.video}')">
    <div class="thumb">
      <img src="thumbs/${v.video.replace('.mp4','.jpg')}" alt="${v.titulo}" loading="lazy">
      <div class="play"><div class="play-circle"><div class="tri"></div></div></div>
    </div>
    <div class="info"><div class="titulo">${v.titulo}</div><div class="anno">${v.anno}</div></div>
  </div>`;
});
function ver(src){
  const v=document.getElementById('mvid');
  v.src=src; v.play().catch(()=>{});
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function cerrar(e){
  if(e&&e.target!==document.getElementById('modal')&&e.target.tagName!=='BUTTON')return;
  const v=document.getElementById('mvid');
  v.pause();v.src='';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta property="og:title" content="ATF by Simplex — Portfolio de Trabajos">
<meta property="og:description" content="Retrofit de faros LED profesional en Guadalajara. Ve nuestros trabajos terminados.">
<title>ATF by Simplex — Trabajos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070a0e;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.header{background:#0d1117;border-bottom:1px solid #21262d;padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:28px;font-weight:900;color:#00d4ff;letter-spacing:-1px}
.logo span{color:#7d8590;font-weight:400;font-size:13px;margin-left:6px}
.wa-btn{background:#25D366;color:#000;font-weight:800;font-size:13px;padding:8px 16px;border-radius:8px;text-decoration:none}
.hero{padding:40px 20px 24px;text-align:center}
.hero h1{font-size:26px;font-weight:900;margin-bottom:8px}
.hero p{font-size:14px;color:#7d8590;max-width:400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:16px 16px 80px;max-width:1000px;margin:0 auto}
.card{background:#0d1117;border:1px solid #21262d;border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;color:inherit;display:block}
.card:hover{border-color:#00d4ff40;transform:translateY(-2px)}
.thumb{width:100%;aspect-ratio:16/9;background:#161b22;position:relative;overflow:hidden}
.thumb video{width:100%;height:100%;object-fit:cover}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#00000060;transition:.2s}
.card:hover .play-overlay{background:#00000030}
.play-circle{width:52px;height:52px;border-radius:50%;background:#00d4ff20;border:2px solid #00d4ff80;display:flex;align-items:center;justify-content:center}
.play-tri{width:0;height:0;border-style:solid;border-width:10px 0 10px 18px;border-color:transparent transparent transparent #00d4ff;margin-left:3px}
.card-body{padding:16px}
.card-title{font-size:16px;font-weight:700;margin-bottom:4px}
.card-meta{font-size:12px;color:#7d8590;display:flex;gap:12px}
.tag{display:inline-block;background:#00d4ff15;border:1px solid #00d4ff30;color:#00d4ff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-right:6px;margin-top:6px}
.footer{background:#0d1117;border-top:1px solid #21262d;padding:24px 20px;text-align:center;font-size:13px;color:#7d8590}
.footer a{color:#00d4ff}
/* Modal video */
.modal{display:none;position:fixed;inset:0;background:#000000cc;z-index:100;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-inner{background:#0d1117;border-radius:14px;overflow:hidden;max-width:800px;width:100%;position:relative}
.modal-inner video{width:100%;display:block;max-height:60vh}
.modal-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:#7d8590;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:#e6edf3}
.modal-footer{padding:12px 16px;display:flex;gap:10px}
.wa-cta{background:#25D366;color:#000;font-weight:800;font-size:14px;padding:10px 20px;border-radius:8px;text-decoration:none;flex:1;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="logo">ATF <span>by Simplex</span></div>
  <a href="https://wa.me/523326148674?text=Vi+sus+trabajos%2C+quiero+informes" class="wa-btn">Agendar cita</a>
</div>

<div class="hero">
  <h1>Nuestros trabajos</h1>
  <p>Retrofit de faros LED profesional · Tuning y Diseño de Iluminación Automotriz · Guadalajara</p>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  <p>📍 Longinos Cadena 1740, Col. Lomas de Polanco, Guadalajara</p>
  <p style="margin-top:6px">📱 <a href="https://wa.me/523326148674">33 2614 8674</a> · Anuar Milan</p>
</div>

<!-- Modal reproductor -->
<div class="modal" id="modal" onclick="cerrarModal(event)">
  <div class="modal-inner">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <video id="modal-video" controls playsinline></video>
    <div class="modal-footer">
      <a href="https://wa.me/523326148674?text=Vi+su+trabajo+en+el+portfolio%2C+quiero+informes" class="wa-cta">
        Quiero esto en mi auto →
      </a>
    </div>
  </div>
</div>

<script>
const BASE = 'videos/';

const TRABAJOS = [
  {
    titulo:   "Retrofit Completo 2024",
    auto:     "Por definir",
    anno:     "2024",
    tags:     ["Bi-LED","Full","2024"],
    video:    "atf_2024_retrofit_completo.mp4",
    featured: true,
  },
  {
    titulo:   "Transformación Completa 2023",
    auto:     "Por definir",
    anno:     "2023",
    tags:     ["Bi-LED","LED"],
    video:    "atf_2023_transformacion.mp4",
    featured: false,
  },
  {
    titulo:   "Último Trabajo 2025",
    auto:     "Por definir",
    anno:     "2025",
    tags:     ["2025","Nuevo"],
    video:    "atf_2025_nuevo.mp4",
    featured: false,
  },
  {
    titulo:   "Retrofit Clásico 2022",
    auto:     "Por definir",
    anno:     "2022",
    tags:     ["2022","Clásico"],
    video:    "atf_2022_clasico.mp4",
    featured: false,
  },
  {
    titulo:   "Resultado Final 2023",
    auto:     "Por definir",
    anno:     "2023",
    tags:     ["Resultado"],
    video:    "atf_2023_resultado.mp4",
    featured: false,
  },
  {
    titulo:   "Trabajo 2023",
    auto:     "Por definir",
    anno:     "2023",
    tags:     ["2023"],
    video:    "atf_2023_trabajo.mp4",
    featured: false,
  },
];

const grid = document.getElementById('grid');

TRABAJOS.forEach((t, i) => {
  const tags = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
  const featured = t.featured ? '<span class="tag" style="background:#ff880020;border-color:#ff880040;color:#ff8800">DESTACADO</span>' : '';
  const videoUrl = BASE + t.video;
  const thumbUrl = 'thumbs/' + t.video.replace('.mp4', '.jpg');

  grid.innerHTML += `
    <div class="card" onclick="abrirVideo('${videoUrl}','${t.titulo}')">
      <div class="thumb">
        <img src="${thumbUrl}" alt="${t.titulo}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
        <video src="${videoUrl}" preload="none" muted playsinline style="pointer-events:none;position:absolute;inset:0;opacity:0"></video>
        <div class="play-overlay">
          <div class="play-circle"><div class="play-tri"></div></div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${t.titulo}</div>
        <div class="card-meta"><span>${t.auto}</span><span>${t.anno}</span></div>
        <div style="margin-top:8px">${featured}${tags}</div>
      </div>
    </div>`;
});

function abrirVideo(src, titulo) {
  const v = document.getElementById('modal-video');
  document.getElementById('modal-title').textContent = titulo;
  v.src = src;
  v.play();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  const v = document.getElementById('modal-video');
  v.pause();
  v.src = '';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
</script>
</body>
</html>
